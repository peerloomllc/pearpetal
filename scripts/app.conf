# App-specific configuration for the release pipeline.
# Both release.sh and ios-appstore.sh source this file (set -a, so every var is
# exported to the build subshells and `expo prebuild`).

# -- Identity -----------------------------------------------------------------
APP_NAME=PearPetal                            # Display name (logs, Nostr posts)
BUNDLE_ID=com.pearpetal                        # iOS bundle ID and Android package name
ARTIFACT_PREFIX=pearpetal                       # APK/AAB filename prefix (pearpetal-v1.0.0.apk)

# -- iOS / Xcode --------------------------------------------------------------
XCODE_WORKSPACE=ios/PearPetal.xcworkspace
XCODE_SCHEME=PearPetal
XCODE_PROJECT=ios/PearPetal.xcodeproj/project.pbxproj
# App Store DISTRIBUTION profile (manual signing in ios-appstore.sh). Must be
# created once in the Developer portal: Profiles -> + -> App Store -> App ID
# com.pearpetal -> "Apple Distribution" cert. Because the com.pearpetal App ID
# has the Associated Domains capability, this profile includes it (Universal
# Links work on the App Store build). Name it exactly this, or change here.
IOS_PROVISIONING_PROFILE="PearPetal App Store"

# Universal Links: keep the Associated Domains entitlement in RELEASE builds.
# The `with-ios-no-associated-domains` plugin strips it by DEFAULT (so no-App-ID
# dev builds archive with the wildcard profile); this flag tells it to KEEP the
# plain `applinks:peerloomllc.com` (production form, served via Apple's CDN).
# Sourced with `set -a`, so it applies to any `expo prebuild` these scripts run.
# (No-op for Android prebuild - the plugin is iOS-only.)
export PEARPETAL_ASSOCIATED_DOMAINS=1

# -- Android signing -----------------------------------------------------------
# Release APK/AAB is signed with the `pearpetal` key in the shared keystore
# (~/keystore.jks). This MUST match the SHA-256 in the website's
# .well-known/assetlinks.json (com.pearpetal, 34:DA:6E:42:...) or Android App
# Links tap-to-open will fail signature verification. Set KEYSTORE_FILE +
# passwords in scripts/.env.
KEY_ALIAS_DEFAULT=pearpetal

# -- Mac Mini build host -------------------------------------------------------
MAC_MINI_REPO_PATH="peerloomllc/pearpetal"

# -- Nostr announcement --------------------------------------------------------
APP_TAGLINE="A private, peer-to-peer menstrual & fertility cycle tracker. No account, no server, no cloud."
APP_WEBSITE=https://peerloomllc.com/pearpetal/
NOSTR_HASHTAGS="#PearPetal #Nostr #Bitcoin #P2P #cycletracking #fertility #privacy #Android #iOS #Zapstore"

# -- Screenshot automation (used by the screenshot scripts, not yet ported) ---
# iOS: space-separated "DeviceName|UDID" pairs (see `xcrun simctl list devices`
# on the Mac Mini). iPhone 17 Pro Max is the 6.9" App Store required size. Fill
# the UDID from the Mac before running the (to-be-ported) screenshot scripts.
IOS_SCREENSHOT_DEVICES="iPhone-17-Pro-Max|"

# Android: release APKs keep the com.pearpetal applicationId (no debug suffix).
ANDROID_APP_ID="com.pearpetal"
ANDROID_MAIN_ACTIVITY="com.pearpetal/com.pearpetal.MainActivity"
ANDROID_SCREENSHOT_AVDS="Pixel_9"
